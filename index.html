            static getDerivedStateFromError(error) {
                return { hasError: true };

                return this.props.children;

            const pascalName = name.charAt(0).toUpperCase() + name.slice(1);
            
            // Try to find the component in LucideReact
            const LucideIcon = (window.lucideReact && (window.lucideReact[pascalName] || window.lucideReact[name])) ||

            if (LucideIcon && (typeof LucideIcon === 'function' || typeof LucideIcon === 'object') && !Array.isArray(LucideIcon)) {
                try {
                    return <LucideIcon className={className} strokeWidth={1.5} {...props} />;
                } catch (e) {
                    // Fall through to manual rendering
                }
            }
            
            // Fallback to manual SVG if it's raw data (from lucide core)
            const iconData = window.lucide && window.lucide.icons ? (window.lucide.icons[name] || window.lucide.icons[name?.toLowerCase()] || window.lucide[name] || window.lucide[name?.toLowerCase()]) : null;

                    const error = new Error('Your browser does not support audio/video calls. Please use a modern browser (Chrome, Safari, Firefox).');
                    error.code = 'NOT_SUPPORTED';
                    throw error;
                }

                try {
                    return await navigator.mediaDevices.getUserMedia(constraints);
                } catch (err) {
                    // Friendly error messages
                    let message = 'Could not access microphone/camera.';
                    
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        message = 'Permission denied. Please allow microphone access in your browser settings.';
                    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                        message = 'No microphone/camera found. Please connect a device.';
                    } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                        message = 'Microphone/camera is already in use by another app.';
                    } else if (err.name === 'OverconstrainedError') {
                        message = 'Camera constraints not supported by your device.';
                    } else if (err.name === 'SecurityError') {
                        message = 'Security error. Calls require HTTPS connection.';

                        if (searchFilter === 'users') return chat.type === 'private' && !allUsers[Object.keys(chat.members).find(id => id !== user?.id)]?.isBot;
                        if (searchFilter === 'bots') return chat.type === 'private' && allUsers[Object.keys(chat.members).find(id => id !== user?.id)]?.isBot;
                        if (searchFilter === 'groups') return chat.type === 'group';
                        if (searchFilter === 'channels') return chat.type === 'channel';
                        return true;
                    });
                }

                myChats = myChats.sort((a, b) => {
                    const aPinned = user?.pinnedChats?.[a.id] ? 1 : 0;
                    const bPinned = user?.pinnedChats?.[b.id] ? 1 : 0;
                    if (aPinned !== bPinned) return bPinned - aPinned;
                    return (b.lastTimestamp || 0) - (a.lastTimestamp || 0);

                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // WebRTC Incoming Call Listener

                    const now = Date.now();
                    Object.entries(calls).forEach(([callId, callData]) => {
                        // Ignore calls older than 2 minutes
                        if (callData.timestamp < now - 120000) return;

                        if (callData.status === 'ringing') {
                            if (callState === 'idle') {
                                setCurrentCall({
                                    id: callId,
                                    name: callData.callerName,
                                    avatar: callData.callerAvatar,
                                    isCaller: false,

                                });
                                setCallState('receiving');
                                callDocRef.current = db.ref(`calls/${callId}`);
                            } else if (currentCall?.id !== callId) {
                                // Auto-reject if busy with a DIFFERENT call
                                db.ref(`calls/${callId}`).update({ status: 'busy' });
                            }
                        } else if ((callData.status === 'ended' || callData.status === 'rejected') && currentCall?.id === callId) {
                            endCall(false);
                        }
                    });
                };
                
                callsRef.on('value', handleCall);

                    }
                } else {

            const startCall = async (receiver) => {
                if (!user) return;
                if (receiver.id === user.id) {
                    showNotification("You cannot call yourself", "error");

                }
                try {
                    const stream = await safeGetUserMedia({ audio: true });
                    localStreamRef.current = stream;
                    
                    pcRef.current = new RTCPeerConnection(servers);
                    
                    stream.getTracks().forEach(track => {
                        pcRef.current.addTrack(track, stream);
                    });

                    pcRef.current.ontrack = (event) => {
                        if (event.track.kind === 'audio' && remoteAudioRef.current) {
                            remoteAudioRef.current.srcObject = event.streams[0];
                        }
                        if (event.track.kind === 'video' && remoteVideoRef.current) {
                            remoteVideoRef.current.srcObject = event.streams[0];
                            setHasRemoteVideo(true);
                        }
                    };

                    const callDoc = db.ref('calls').push();
                    callDocRef.current = callDoc;

                        if (event.candidate) {
                            callDoc.child('offerCandidates').push(event.candidate.toJSON());
                        }
                    };

                        if (pcRef.current.connectionState === 'connected') {
                            setCallState('connected');
                            startCallTimer();
                        } else if (pcRef.current.connectionState === 'failed' || pcRef.current.connectionState === 'disconnected') {
                            endCall(true, 'ended');
                        }
                    };

                    const offerDescription = await pcRef.current.createOffer();
                    await pcRef.current.setLocalDescription(offerDescription);

                    const offer = {
                        sdp: offerDescription.sdp,
                        type: offerDescription.type,
                    };

                    await callDoc.set({
                        callerId: user.id,
                        callerName: user.username,
                        callerAvatar: user.avatar || null,
                        receiverId: receiver.id,
                        receiverName: receiver.username,
                        receiverAvatar: receiver.avatar || null,
                        offer,
                        status: 'ringing',
                        timestamp: Date.now()
                    });

                    // Ensure call ends on disconnect
                    callDoc.onDisconnect().update({ status: 'ended' });

                    setCurrentCall({ id: callDoc.key, name: receiver.username, avatar: receiver.avatar, isCaller: true });
                    setCallState('calling');

                    // Listen for answer
                    callDoc.on('value', async (snapshot) => {
                        const data = snapshot.val();
                        if (!data) {
                            endCall(false);
                            return;
                        }
                        
                        if (data.status === 'busy') {
                            showNotification(`${receiver.username} is busy`, "error");
                            endCall(true, 'ended');
                            return;
                        }

                        if (!pcRef.current?.currentRemoteDescription && data.answer) {
                            const answerDescription = new RTCSessionDescription(data.answer);
                            await pcRef.current.setRemoteDescription(answerDescription);
                        }

                        // Handle Renegotiation Offer
                        if (data.renegotiation && data.renegotiation.type === 'offer' && data.renegotiation.offererId !== user.id) {
                             if (pcRef.current.signalingState !== 'stable') return;
                             await pcRef.current.setRemoteDescription(new RTCSessionDescription(data.renegotiation));
                             const answer = await pcRef.current.createAnswer();
                             await pcRef.current.setLocalDescription(answer);
                             await callDoc.update({
                                 renegotiation: {
                                     type: 'answer',
                                     sdp: answer.sdp,
                                     offererId: data.renegotiation.offererId
                                 }
                             });
                        }
                        
                        // Handle Renegotiation Answer
                        if (data.renegotiation && data.renegotiation.type === 'answer' && data.renegotiation.offererId === user.id) {
                            await pcRef.current.setRemoteDescription(new RTCSessionDescription(data.renegotiation));
                        }

                        if (data.status === 'connected') {
                            setCallState('connected');
                            startCallTimer();
                        }
                        if (data.status === 'ended' || data.status === 'rejected') {
                            endCall(false);
                        }
                    });

                    // Listen for remote ICE candidates
                    callDoc.child('answerCandidates').on('child_added', (snapshot) => {
                        const candidate = new RTCIceCandidate(snapshot.val());
                        pcRef.current.addIceCandidate(candidate);
                    });

                } catch (err) {
                    console.error("Error starting call:", err);
                    showNotification(err.message || "Could not access microphone.", "error");
                    if (err.code === 'NOT_SUPPORTED') {
                        alert('⚠️ Voice calls are not supported in this browser.\n\nPlease open the site in:\n• Chrome/Safari (desktop)\n• Safari (iOS)\n• Chrome (Android)\n\nTelegram WebView does not support calls.');
                    }
                }

            const answerCall = async () => {

                    stream.getTracks().forEach(track => {

                            endCall(false);

                        // Handle Renegotiation Offer

                             await pcRef.current.setRemoteDescription(new RTCSessionDescription(data.renegotiation));
                             const answer = await pcRef.current.createAnswer();
                             await pcRef.current.setLocalDescription(answer);
                             await callDoc.update({
                                 renegotiation: {
                                     type: 'answer',
                                     sdp: answer.sdp,
                                     offererId: data.renegotiation.offererId
                                 }
                             });
                        }
                        
                        // Handle Renegotiation Answer
                        if (data?.renegotiation && data.renegotiation.type === 'answer' && data.renegotiation.offererId === user.id) {
                            await pcRef.current.setRemoteDescription(new RTCSessionDescription(data.renegotiation));
                        }
                    });

                } catch (err) {
                    console.error("Error answering call:", err);
                    showNotification(err.message || "Could not access microphone.", "error");
                    endCall(true, 'rejected');
                }
            };

            const uploadStory = (e) => {
                const file = e.target.files[0];
                if (!file || !user) return;
                
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800;
                            const MAX_HEIGHT = 800;
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_WIDTH) {
                                    height *= MAX_WIDTH / width;
                                    width = MAX_WIDTH;
                                }
                            } else {
                                if (height > MAX_HEIGHT) {
                                    width *= MAX_HEIGHT / height;
                                    height = MAX_HEIGHT;
                                }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            
                            const storyId = Date.now();
                            db.ref(`stories/${user.id}/${storyId}`).set({
                                data: dataUrl,
                                timestamp: storyId,
                                expires: storyId + (24 * 60 * 60 * 1000)
                            });
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                } else {
                    // For video, we can't easily compress on client side without heavy libraries, 
                    // so we just upload if it's small enough or just rely on the user.
                    if (file.size > 5 * 1024 * 1024) {
                        alert('Video too large. Max 5MB.');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const storyId = Date.now();
                        db.ref(`stories/${user.id}/${storyId}`).set({
                            data: reader.result,
                            timestamp: storyId,

                    reader.readAsDataURL(file);
                }

                            } else if (textLower === '/start' && config.startMessage) {

                            if (botResponseText || botMediaUrl) {

                                    const botUpdates = { lastMessage: botResponseText || (botMediaType === 'file' ? 'File' : 'Photo'), lastTimestamp: Date.now() };
                                    botUpdates[`unreadCount/${user.id}`] = (chat.unreadCount?.[user.id] || 0) + (botMediaUrl && botResponseText ? 2 : 1);
                                    await chatRef.update(botUpdates);

                    const stream = await safeGetUserMedia(constraints);

                        const mimeType = isVideoMessage ? 'video/webm' : 'audio/webm';

                if (!selectedGift || !user) return;
                
                const recipientId = giftRecipient.trim() ? giftRecipient.toLowerCase().replace(/@/g, '').replace(/\s/g, '_') : user.id;
                
                if (user.stars < selectedGift.price) {
                    alert('Not enough Stars!');
                    return;
                }

                try {
                    const recipientRef = db.ref(`users/${recipientId}`);
                    const snapshot = await recipientRef.once('value');
                    
                    if (!snapshot.exists()) {
                        alert('Recipient not found!');
                        return;
                    }

                    const recipientData = snapshot.val();
                    const giftId = Date.now().toString();
                    const newGift = { 
                        ...selectedGift, 
                        instanceId: giftId,
                        from: user.username, 
                        timestamp: Date.now() 
                    };
                    const newGifts = [...(recipientData.gifts || []), newGift];
                    
                    // Deduct stars from sender
                    await db.ref(`users/${user.id}`).update({ stars: user.stars - selectedGift.price });
                    
                    // Add gift to recipient
                    await recipientRef.update({ gifts: newGifts });
                    
                    alert(`Gift ${selectedGift.name} sent to ${recipientData.username}!`);
                    setShowGiftModal(false);
                    setSelectedGift(null);
                    setGiftRecipient('');
                } catch (error) {
                    alert('Failed to send gift: ' + error.message);
                }
            };

            const sellGift = async (giftInstanceId) => {
                if (!user || !user.gifts) return;
                
                const giftToSell = user.gifts.find(g => g.instanceId === giftInstanceId);
                if (!giftToSell) return;

                const refundAmount = Math.floor(giftToSell.price * 0.5);
                const updatedGifts = user.gifts.filter(g => g.instanceId !== giftInstanceId);

                try {
                    await db.ref(`users/${user.id}`).update({
                        stars: (user.stars || 0) + refundAmount,
                        gifts: updatedGifts
                    });
                    alert(`Sold for ${refundAmount} Stars!`);
                    setSellConfirmModal({ giftId: null, isOpen: false });
                } catch (error) {
                    alert('Failed to sell gift: ' + error.message);
                }
            };

            const buyPremiumWithStars = async () => {
                if (!user) return;
                if (user.stars < 10000) {
                    alert(t.notEnoughStars);
                    return;
                }
                const premiumExpiry = (user.premiumUntil || Date.now()) + (7 * 24 * 60 * 60 * 1000);
                try {
                    await db.ref(`users/${user.id}`).update({
                        stars: user.stars - 10000,
                        isPremium: true,

                    return;

                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-xl font-bold">Create Sticker Pack</h3>
                                        <button onClick={() => setShowCreatePackModal(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><Icon name="X" className="w-5 h-5" /></button>
                                    </div>
                                    <div className="space-y-4">
                                        <input 
                                            type="text" 
                                            placeholder="Pack Name" 
                                            value={newPackName}
                                            onChange={e => setNewPackName(e.target.value)}
                                            className={`w-full p-3 rounded-xl border focus:outline-none focus:border-tg-blue transition-colors ${isDark ? "bg-black/20 border-white/10" : "bg-slate-50 border-slate-200"}`}
                                        />
                                        <div>
                                            <label className="cursor-pointer inline-flex items-center gap-2 text-tg-blue bg-tg-blue/10 px-4 py-2 rounded-xl hover:bg-tg-blue/20 transition-colors">
                                                <Icon name="Upload" className="w-5 h-5" />
                                                Upload Stickers
                                                <input type="file" accept="image/*" multiple className="hidden" onChange={handlePackStickerUpload} />
                                            </label>
                                        </div>
                                        <div className="grid grid-cols-4 gap-2 max-h-48 overflow-y-auto p-1">
                                            {newPackStickers.map((st, i) => (
                                                <div key={i} className="relative w-16 h-16 bg-black/5 dark:bg-white/5 rounded-xl p-1">
                                                    <img src={st} className="w-full h-full object-contain" />
                                                    <button onClick={() => setNewPackStickers(prev => prev.filter((_, idx) => idx !== i))} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md hover:scale-110 transition-transform">
                                                        <Icon name="X" className="w-3 h-3" />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={handleCreatePack} disabled={!newPackName.trim() || newPackStickers.length === 0} className="w-full py-3 bg-tg-blue text-white rounded-xl font-bold hover:bg-tg-light-blue transition-colors disabled:opacity-50 mt-4">
                                            Create Pack
                                        </button>
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Image/Video Preview Modal */}
                    <AnimatePresence>
                        {previewImage && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 bg-black/90 z-[200] flex items-center justify-center p-4" onClick={() => setPreviewImage(null)}>
                                <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.9, opacity: 0 }} className="relative max-w-full max-h-[90vh] flex items-center justify-center" onClick={e => e.stopPropagation()}>
                                    {previewImage.startsWith('data:video') ? (
                                        <video src={previewImage} controls autoPlay className="max-w-full max-h-[90vh] rounded-lg shadow-2xl" />
                                    ) : (
                                        <img src={previewImage} className="max-w-full max-h-[90vh] rounded-lg shadow-2xl object-contain" />
                                    )}
                                    <button onClick={() => setPreviewImage(null)} className="absolute -top-12 right-0 p-2 text-white hover:bg-white/10 rounded-full"><Icon name="X" className="w-8 h-8" /></button>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Hidden Audio Element for Remote Stream */}
                    <audio ref={remoteAudioRef} autoPlay />


                    {/* Notification Toast */}
                    <AnimatePresence>
                        {notification && (
                            <motion.div
                                initial={{ opacity: 0, y: -50 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -50 }}
                                className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-[300] px-6 py-3 rounded-xl shadow-xl flex items-center gap-3 ${
                                    notification.type === 'error' ? 'bg-red-500 text-white' : 
                                    notification.type === 'success' ? 'bg-green-500 text-white' : 
                                    'bg-white dark:bg-slate-800 text-slate-900 dark:text-white'
                                }`}
                            >
                                <Icon name={notification.type === 'error' ? 'AlertCircle' : notification.type === 'success' ? 'Check' : 'Info'} className="w-5 h-5" />
                                <span className="font-medium">{notification.message}</span>
                            </motion.div>
                        )}
                    </AnimatePresence>


                    {/* Call Modals */}
                    <AnimatePresence>
                        {callState !== 'idle' && currentCall && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 bg-black z-[200] flex items-center justify-center">
                                <motion.div initial={{ scale: 0.9 }} animate={{ scale: 1 }} exit={{ scale: 0.9 }} className={`bg-slate-900 text-white w-full ${isVideoEnabled || hasRemoteVideo ? "max-w-5xl h-screen" : "max-w-sm rounded-3xl p-8"} flex flex-col items-center shadow-2xl transition-all duration-300`}>
                                    
                                    {/* Video Container */}
                                    <div className={`relative w-full flex-1 flex items-center justify-center overflow-hidden ${isVideoEnabled || hasRemoteVideo ? "bg-black" : "mb-6"}`}>
                                        {/* Remote Video */}
                                        <video 
                                            ref={remoteVideoRef} 
                                            autoPlay 
                                            playsInline 
                                            style={{ transform: `scale(${zoomLevel})`, transition: 'transform 0.2s ease' }}
                                            className={`w-full h-full object-contain ${(!hasRemoteVideo) ? "hidden" : ""}`} 
                                        />
                                        
                                        {/* Local Video (PIP) */}
                                        <div className={`absolute bottom-24 right-4 w-32 h-48 bg-black rounded-xl overflow-hidden border-2 border-white/20 shadow-lg ${!isVideoEnabled ? "hidden" : ""}`}>
                                            <video ref={localVideoRef} autoPlay playsInline muted className="w-full h-full object-cover scale-x-[-1]" />
                                        </div>

                                        {/* Avatar (if no video) */}
                                        {(!hasRemoteVideo) && (
                                            <div className="w-32 h-32 rounded-full bg-tg-blue flex items-center justify-center text-4xl font-bold overflow-hidden relative">
                                                {currentCall.avatar ? <AvatarImage src={currentCall.avatar} className="w-full h-full object-cover" /> : currentCall.name?.[0] || '?'}
                                                {callState === 'calling' && (
                                                    <div className="absolute inset-0 rounded-full border-4 border-white/20 animate-ping" />
                                                )}
                                            </div>
                                        )}

                                        {/* Zoom Controls Overlay */}
                                        {hasRemoteVideo && (
                                            <div className="absolute top-4 right-4 flex flex-col gap-2">
                                                <button onClick={() => setZoomLevel(prev => Math.min(prev + 0.5, 4))} className="p-3 bg-black/40 hover:bg-black/60 rounded-full text-white backdrop-blur-md transition-colors">
                                                    <Icon name="ZoomIn" className="w-6 h-6" />
                                                </button>
                                                <button onClick={() => setZoomLevel(prev => Math.max(prev - 0.5, 1))} className="p-3 bg-black/40 hover:bg-black/60 rounded-full text-white backdrop-blur-md transition-colors">
                                                    <Icon name="ZoomOut" className="w-6 h-6" />
                                                </button>
                                                <button onClick={() => setZoomLevel(1)} className="p-3 bg-black/40 hover:bg-black/60 rounded-full text-white backdrop-blur-md transition-colors text-xs font-bold">
                                                    RESET
                                                </button>
                                            </div>
                                        )}
                                    </div>

                                    {/* Info Overlay (for video calls) */}
                                    {(isVideoEnabled || hasRemoteVideo) && (
                                        <div className="absolute top-8 left-8 pointer-events-none">
                                            <h2 className="text-2xl font-bold drop-shadow-lg">{currentCall.name}</h2>
                                            <p className="text-white/70 drop-shadow-lg">{formatCallTime(callDuration)}</p>
                                        </div>
                                    )}

                                    {/* Name & Status (for audio calls) */}
                                    {!(isVideoEnabled || hasRemoteVideo) && (
                                        <>
                                            <h2 className="text-2xl font-bold mb-2">{currentCall.name}</h2>
                                            <p className="text-white/50 mb-8">
                                                {callState === 'calling' ? 'Calling...' : 
                                                 callState === 'receiving' ? 'Incoming Call...' : 
                                                 formatCallTime(callDuration)}
                                            </p>
                                        </>
                                    )}

                                    {/* Controls */}
                                    <div className={`flex items-center gap-4 ${isVideoEnabled || hasRemoteVideo ? "absolute bottom-8 bg-slate-800/90 p-4 rounded-2xl border border-white/10" : ""}`}>
                                        {callState === 'receiving' ? (
                                            <>
                                                <button onClick={() => endCall(true, 'rejected')} className="w-16 h-16 rounded-full bg-red-500 flex items-center justify-center hover:bg-red-600 transition-colors shadow-lg shadow-red-500/20">
                                                    <Icon name="PhoneOff" className="w-6 h-6" />
                                                </button>
                                                <button onClick={answerCall} className="w-16 h-16 rounded-full bg-green-500 flex items-center justify-center hover:bg-green-600 transition-colors shadow-lg shadow-green-500/20 animate-bounce">
                                                    <Icon name="Phone" className="w-6 h-6" />
                                                </button>
                                            </>
                                        ) : (
                                            <>
                                                <button onClick={toggleMute} className={`w-12 h-12 rounded-full flex items-center justify-center transition-colors ${isMuted ? 'bg-white text-slate-900' : 'bg-white/10 text-white hover:bg-white/20'}`}>
                                                    <Icon name={isMuted ? "MicOff" : "Mic"} className="w-5 h-5" />
                                                </button>
                                                <button onClick={toggleVideo} className={`w-12 h-12 rounded-full flex items-center justify-center transition-colors ${isVideoEnabled ? 'bg-white text-slate-900' : 'bg-white/10 text-white hover:bg-white/20'}`}>
                                                    <Icon name={isVideoEnabled ? "Video" : "VideoOff"} className="w-5 h-5" />
                                                </button>
                                                <button onClick={() => setZoomLevel(prev => Math.min(prev + 0.5, 4))} className="w-12 h-12 rounded-full flex items-center justify-center bg-white/10 text-white hover:bg-white/20 transition-colors">
                                                    <Icon name="ZoomIn" className="w-5 h-5" />
                                                </button>
                                                <button onClick={() => setZoomLevel(prev => Math.max(prev - 0.5, 1))} className="w-12 h-12 rounded-full flex items-center justify-center bg-white/10 text-white hover:bg-white/20 transition-colors">
                                                    <Icon name="ZoomOut" className="w-5 h-5" />
                                                </button>
                                                <button onClick={toggleScreenShare} className={`w-12 h-12 rounded-full flex items-center justify-center transition-colors ${isScreenSharing ? 'bg-white text-slate-900' : 'bg-white/10 text-white hover:bg-white/20'}`}>
                                                    <Icon name="Monitor" className="w-5 h-5" />
                                                </button>
                                                <button onClick={() => endCall(true, 'ended')} className="w-14 h-14 rounded-full bg-red-500 flex items-center justify-center hover:bg-red-600 transition-colors shadow-lg shadow-red-500/20">
                                                    <Icon name="PhoneOff" className="w-6 h-6" />
                                                </button>
                                            </>
                                        )}
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
